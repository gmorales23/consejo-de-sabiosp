<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" aria-labelledby="logoTitle logoDesc" role="img">
  <title id="logoTitle">Consejo de Sabios Podcast Logo</title>
  <desc id="logoDesc">Minimalist circular badge logo featuring a monochromatic stylized Clone Wars Yoda in gold tones.</desc>
  
  <!-- Outer circle border -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="#F0C92F" stroke-width="18"/>
  <circle cx="400" cy="400" r="355" fill="none" stroke="#1C1C1C" stroke-width="12"/>
  
  <!-- Inner decorative ring -->
  <circle cx="400" cy="400" r="310" fill="none" stroke="#F0C92F" stroke-width="8" stroke-dasharray="12 18"/>
  
  <!-- Yoda Icon - MONOCROMATIC in gold/beige tones -->
  <!-- Head - monochromatic gold/beige -->
  <ellipse cx="400" cy="355" rx="115" ry="128" fill="#D4B896" stroke="#1C1C1C" stroke-width="14"/>
  
  <!-- Forehead wrinkles / wisdom lines (darker gold) -->
  <path d="M320 290 Q400 265 480 290" fill="none" stroke="#B89A6F" stroke-width="9" stroke-linecap="round"/>
  <path d="M330 275 Q400 255 470 275" fill="none" stroke="#B89A6F" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Ears (large, pointed, Clone Wars proportion) - monochromatic -->
  <!-- Left Ear -->
  <path d="M285 340 Q220 290 235 380 Q240 430 285 395" fill="#D4B896" stroke="#1C1C1C" stroke-width="14"/>
  <!-- Right Ear -->
  <path d="M515 340 Q580 290 565 380 Q560 430 515 395" fill="#D4B896" stroke="#1C1C1C" stroke-width="14"/>
  
  <!-- Eye sockets / deep wise eyes (darker shade) -->
  <ellipse cx="355" cy="345" rx="22" ry="28" fill="#8B7355"/>
  <ellipse cx="445" cy="345" rx="22" ry="28" fill="#8B7355"/>
  
  <!-- Eye highlights - bright gold -->
  <circle cx="360" cy="340" r="9" fill="#F0C92F"/>
  <circle cx="450" cy="340" r="9" fill="#F0C92F"/>
  
  <!-- Nose - simple, aged structure -->
  <path d="M400 355 Q395 380 385 395" fill="none" stroke="#B89A6F" stroke-width="11" stroke-linecap="round"/>
  
  <!-- Mouth - serious, firm, wise (subtle downturn) -->
  <path d="M360 415 Q400 425 440 415" fill="none" stroke="#B89A6F" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Subtle cheek shading / definition (darker gold tone) -->
  <ellipse cx="325" cy="380" rx="28" ry="18" fill="#C4A67A" opacity="0.5"/>
  <ellipse cx="475" cy="380" rx="28" ry="18" fill="#C4A67A" opacity="0.5"/>
  
  <!-- Robe hood / collar framing the head -->
  <path d="M280 430 Q300 480 400 505 Q500 480 520 430" fill="#1C1C1C" stroke="#F0C92F" stroke-width="12"/>
  
  <!-- Text: CONSEJO DE SABIOS -->
  <!-- Upper arc text -->
  <text x="400" y="215" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#F0C92F" letter-spacing="4px" style="paint-order: stroke fill; stroke: #1C1C1C; stroke-width: 8px;">CONSEJO</text>
  
  <!-- Lower arc text -->
  <text x="400" y="605" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#F0C92F" letter-spacing="6px" style="paint-order: stroke fill; stroke: #1C1C1C; stroke-width: 8px;">DE SABIOS</text>
  
  <!-- Very subtle inner gold ring for premium feel -->
  <circle cx="400" cy="400" r="285" fill="none" stroke="#F0C92F" stroke-width="3" opacity="0.6"/>
</svg>